        <p>1、redis key-value<br><figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br></pre></td><td class="code"><pre><span class="line"><span class="variable">$redis</span>-&gt;<span class="built_in">set</span>(<span class="variable">$key</span>,<span class="variable">$value</span>);</span><br><span class="line"><span class="variable">$redis</span>-&gt;get(<span class="variable">$key</span>);</span><br><span class="line"><span class="variable">$redis</span>-&gt;exists(<span class="variable">$key</span>);</span><br></pre></td></tr></table></figure></p>
<p>2、redis订阅发布： —未实现，阻塞<br><figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br></pre></td><td class="code"><pre><span class="line"><span class="variable">$redis</span>=new Redis();</span><br><span class="line"><span class="variable">$redis</span>-&gt;connect(“127.0.0.1”,6379);</span><br><span class="line"><span class="variable">$redis</span>-&gt;auth(“123”);</span><br><span class="line"><span class="variable">$redis</span>-&gt;publish(‘test.22’,”nihao”);</span><br><span class="line"><span class="variable">$redis</span>-&gt;publish(‘<span class="built_in">test</span>’,”nihao”);</span><br><span class="line"><span class="variable">$channelName</span>=”<span class="built_in">test</span>”;</span><br><span class="line"><span class="variable">$redis</span>-&gt;subscribe(array(<span class="variable">$channelName</span>), ‘callback’);</span><br><span class="line"><span class="keyword">function</span> callback(<span class="variable">$redis</span>,<span class="variable">$channelName</span>,<span class="variable">$message</span>)&#123;</span><br><span class="line">  <span class="built_in">echo</span> <span class="variable">$message</span>;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure></p>
<p>3、redis 先进先出，队列<br><figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br></pre></td><td class="code"><pre><span class="line"><span class="variable">$redis</span>-&gt;lpush(“<span class="built_in">test</span>”, “3”);</span><br><span class="line"><span class="variable">$redis</span>-&gt;lpush(“<span class="built_in">test</span>”, “2”);</span><br><span class="line"><span class="variable">$redis</span>-&gt;Rpop(‘<span class="built_in">test</span>’);</span><br><span class="line"><span class="variable">$arrList</span> = <span class="variable">$redis</span>-&gt;lrange(“<span class="built_in">test</span>”, 0 ,2);</span><br><span class="line">print_r(<span class="variable">$arrList</span>);</span><br></pre></td></tr></table></figure></p>
<p>4、排行操作</p>
<figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br></pre></td><td class="code"><pre><span class="line">//增加积分,会员名，分数</span><br><span class="line">  public <span class="keyword">function</span> addScores(<span class="variable">$memeber</span>, <span class="variable">$scores</span>)&#123;</span><br><span class="line">      <span class="variable">$redis</span>=new Redis();</span><br><span class="line">      <span class="variable">$redis</span>-&gt;connect(“127.0.0.1”,6379);</span><br><span class="line">      <span class="variable">$redis</span>-&gt;auth(“123”);</span><br><span class="line">      <span class="variable">$key</span> = date(‘Ymd’);</span><br><span class="line">      <span class="built_in">return</span> <span class="variable">$redis</span>-&gt;zIncrBy(<span class="variable">$key</span>, <span class="variable">$scores</span>, <span class="variable">$memeber</span>);</span><br><span class="line">  &#125;</span><br><span class="line">  //获取排名,<span class="variable">$date</span> 作为key</span><br><span class="line">  public <span class="keyword">function</span> getRank(<span class="variable">$date</span>, <span class="variable">$start</span>, <span class="variable">$stop</span>)&#123;</span><br><span class="line">      <span class="variable">$redis</span>=new Redis();</span><br><span class="line">      <span class="variable">$redis</span>-&gt;connect(“127.0.0.1”,6379);</span><br><span class="line">      <span class="variable">$redis</span>-&gt;auth(“123”);</span><br><span class="line">      <span class="variable">$key</span>=<span class="variable">$date</span>;</span><br><span class="line">      <span class="built_in">return</span> <span class="variable">$redis</span>-&gt;zRevRange(<span class="variable">$key</span>, <span class="variable">$start</span>, <span class="variable">$stop</span>, <span class="literal">true</span>);</span><br><span class="line">  &#125;</span><br><span class="line">  实例：</span><br><span class="line">          //增加积分</span><br><span class="line">          <span class="variable">$this</span>-&gt;addScores(‘zs’,5);</span><br><span class="line">          <span class="variable">$this</span>-&gt;addScores(‘ls’,8);</span><br><span class="line">          <span class="variable">$this</span>-&gt;addScores(‘ww’,2);</span><br><span class="line">          <span class="variable">$this</span>-&gt;addScores(‘wl’,2);</span><br><span class="line">          <span class="variable">$this</span>-&gt;addScores(‘lw’,10);</span><br><span class="line">          //获取排名</span><br><span class="line">         <span class="variable">$this</span>-&gt;getRank(<span class="variable">$key</span>,0,2);</span><br></pre></td></tr></table></figure>
<p>5、redis判断登录和注册：</p>
<figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br></pre></td><td class="code"><pre><span class="line">  <span class="variable">$mobile</span>=<span class="variable">$_POST</span>[‘mobile’];</span><br><span class="line">  <span class="variable">$hmobile</span>=”user:&#123;<span class="variable">$mobile</span>&#125;”;//此处是设置key</span><br><span class="line">  <span class="variable">$r</span>= <span class="variable">$redis</span>-&gt;exists(<span class="variable">$hmobile</span>);//是否存在</span><br><span class="line">  <span class="variable">$m</span>=<span class="variable">$redis</span>-&gt;hExists(<span class="variable">$hmobile</span>,”mobile”);//也可以判断存在 返回为bool</span><br><span class="line">  <span class="keyword">if</span> (<span class="variable">$r</span>==0)&#123;</span><br><span class="line">  <span class="variable">$mobile</span>=<span class="variable">$_POST</span>[‘mobile’];</span><br><span class="line">  <span class="variable">$name</span>=<span class="variable">$_POST</span>[‘mobile’];</span><br><span class="line">  <span class="variable">$pwd</span>=<span class="variable">$_POST</span>[‘<span class="built_in">pwd</span>’];</span><br><span class="line">  <span class="variable">$age</span>=<span class="variable">$_POST</span>[‘age’];</span><br><span class="line">  //   HSET  key field value   哈希的格式</span><br><span class="line">  <span class="variable">$redis</span>-&gt;hSet(<span class="variable">$hmobile</span>,”name”,<span class="variable">$name</span>);</span><br><span class="line">  <span class="variable">$redis</span>-&gt;hSet(<span class="variable">$hmobile</span>,”mobile”,<span class="variable">$mobile</span>);</span><br><span class="line">  <span class="variable">$redis</span>-&gt;hSet(<span class="variable">$hmobile</span>,”<span class="built_in">pwd</span>”,<span class="variable">$pwd</span>);</span><br><span class="line">  <span class="variable">$redis</span>-&gt;hSet(<span class="variable">$hmobile</span>,”age”,<span class="variable">$age</span>);</span><br><span class="line">  <span class="built_in">echo</span> “注册成功！”;</span><br><span class="line">&#125;<span class="keyword">else</span>&#123;</span><br><span class="line">    <span class="built_in">echo</span> “存在，不可注册”;</span><br><span class="line">&#125;</span><br><span class="line"><span class="variable">$all</span>= <span class="variable">$redis</span>-&gt;hGetAll(<span class="variable">$key</span>); //当前key的所有字段 结果 ，返回的是数组</span><br><span class="line">    dump(<span class="variable">$all</span>);</span><br><span class="line">    <span class="variable">$s</span>=<span class="variable">$redis</span>-&gt;hGet(<span class="variable">$key</span>,”mobile”);//单个字段的结果</span><br><span class="line">    dump(<span class="variable">$s</span>);</span><br></pre></td></tr></table></figure>
