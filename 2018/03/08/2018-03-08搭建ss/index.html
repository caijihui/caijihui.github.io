        <h3 id="搭建梯子说明"><a href="#搭建梯子说明" class="headerlink" title="搭建梯子说明"></a>搭建梯子说明</h3><p>只支持国外的vps,国内的服务商ip被墙了。</p>
<h3 id="编写ss-sh"><a href="#编写ss-sh" class="headerlink" title="编写ss.sh"></a>编写ss.sh</h3><p>内容如下：</p>
<figure class="highlight shell"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br><span class="line">53</span><br><span class="line">54</span><br><span class="line">55</span><br><span class="line">56</span><br><span class="line">57</span><br><span class="line">58</span><br><span class="line">59</span><br><span class="line">60</span><br><span class="line">61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br><span class="line">72</span><br><span class="line">73</span><br><span class="line">74</span><br></pre></td><td class="code"><pre><span class="line"><span class="meta">#</span>! /bin/bash</span><br><span class="line"><span class="meta">#</span> log路径</span><br><span class="line">export log_path=/etc/ss.log</span><br><span class="line"><span class="meta">#</span> 设置端口号</span><br><span class="line">echo -n -e '\033[36mPlease enter PORT(1225 default): \033[0m'</span><br><span class="line"><span class="meta">#</span> echo -n "please enter port(1225 default):"</span><br><span class="line">read port</span><br><span class="line">if [ ! -n "$port" ];then</span><br><span class="line">        echo "port will be set to 1225"</span><br><span class="line">        port=1225</span><br><span class="line">else</span><br><span class="line">        echo "port will be set to $port"</span><br><span class="line">fi</span><br><span class="line"><span class="meta">#</span> 设置密码</span><br><span class="line">echo -n -e '\033[36mPlease enter PASSWORD(123456 default): \033[0m'</span><br><span class="line"><span class="meta">#</span> echo -n "please enter password(123456 default):"</span><br><span class="line">read pwd</span><br><span class="line">if [ ! -n "$pwd" ];then</span><br><span class="line">        echo "password will be set to 123456"</span><br><span class="line">        pwd=123456</span><br><span class="line">else</span><br><span class="line">        echo "password will be set to $pwd"</span><br><span class="line">fi</span><br><span class="line"><span class="meta">#</span> 写shadowsocks.json配置文件</span><br><span class="line"><span class="meta">cat&gt;</span>/etc/shadowsocks.json&lt;&lt;EOF</span><br><span class="line">&#123;</span><br><span class="line">    "server":"0.0.0.0",</span><br><span class="line">    "server_port":$port,</span><br><span class="line">    "local_address": "127.0.0.1",</span><br><span class="line">    "local_port":1080,</span><br><span class="line">    "password":"$pwd",</span><br><span class="line">    "timeout":300,</span><br><span class="line">    "method":"aes-256-cfb",</span><br><span class="line">    "fast_open": false</span><br><span class="line">&#125;</span><br><span class="line">EOF</span><br><span class="line"><span class="meta">#</span> 安装 shadowsocks 防火墙等</span><br><span class="line">ret=`yum install -y m2crypto python-setuptools &gt;&gt; $&#123;log_path&#125; 2&gt;&amp;1`</span><br><span class="line">ret=`easy_install pip &gt;&gt; $&#123;log_path&#125; 2&gt;&amp;1`</span><br><span class="line">ret=`pip install shadowsocks &gt;&gt; $&#123;log_path&#125; 2&gt;&amp;1`</span><br><span class="line">ret=`yum install -y firewalld &gt;&gt; $&#123;log_path&#125; 2&gt;&amp;1`</span><br><span class="line">ret=`systemctl start firewalld &gt;&gt; $&#123;log_path&#125; 2&gt;&amp;1`</span><br><span class="line"><span class="meta">#</span> 开启端口</span><br><span class="line">ret=`firewall-cmd --permanent --zone=public --add-port=22/tcp &gt;&gt; $&#123;log_path&#125; 2&gt;&amp;1`</span><br><span class="line">ret=`firewall-cmd --permanent --zone=public --add-port=$port/tcp &gt;&gt; $&#123;log_path&#125; 2&gt;&amp;1`</span><br><span class="line">ret=`firewall-cmd --reload &gt;&gt; $&#123;log_path&#125; 2&gt;&amp;1`</span><br><span class="line"><span class="meta">#</span> 如果有相同功能的进程则杀死</span><br><span class="line"><span class="meta">#</span> pkill -9 ssserver</span><br><span class="line">ps -ef|grep ssserver|grep shadowsocks|awk '&#123; print $2 &#125;'|xargs kill -9</span><br><span class="line">/usr/bin/ssserver -c /etc/shadowsocks.json -d start</span><br><span class="line"><span class="meta">#</span> 成功</span><br><span class="line">if [ $? -eq 0 ];then</span><br><span class="line">clear</span><br><span class="line">cat&lt;&lt;EOF</span><br><span class="line">***************Congratulation!*************</span><br><span class="line">Shadowsocks installed successfully!</span><br><span class="line"></span><br><span class="line">PORT: $port</span><br><span class="line">PASSWORD: $pwd</span><br><span class="line">METHOD: aes-256-cfb</span><br><span class="line"></span><br><span class="line">***************JUST ENJOY IT!**************</span><br><span class="line">EOF</span><br><span class="line"><span class="meta">#</span> 失败</span><br><span class="line">else</span><br><span class="line">clear</span><br><span class="line">cat&lt;&lt;EOF</span><br><span class="line">************Failed,retry please!***********</span><br><span class="line"></span><br><span class="line">cat /etc/ss.log to get something you need…</span><br><span class="line"></span><br><span class="line">************Failed,retry please!***********</span><br><span class="line">EOF</span><br><span class="line">fi</span><br></pre></td></tr></table></figure>
<h3 id="执行脚本"><a href="#执行脚本" class="headerlink" title="执行脚本"></a>执行脚本</h3><figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br></pre></td><td class="code"><pre><span class="line">bash ss.sh</span><br><span class="line"></span><br><span class="line"><span class="comment"># 设置端口号并回车，直接回车是设置为1225</span></span><br><span class="line">Please enter PORT(1225 default):</span><br><span class="line"><span class="comment"># 设置密码并回车，直接回车是设置为123456</span></span><br><span class="line">Please enter PASSWORD(123456 default):</span><br><span class="line"><span class="comment"># 等待一会……就完成了（初次执行约2-5min）</span></span><br></pre></td></tr></table></figure>
